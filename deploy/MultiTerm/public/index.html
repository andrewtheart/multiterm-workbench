<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MultiTerm Workbench</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <nav class="chrome-controls" aria-label="Workspace chrome controls">
        <button id="toggleHeader" class="chrome-toggle" type="button" title="Hide header" aria-label="Hide header" aria-pressed="false">
          <i class="icon-when-visible" data-lucide="panel-top-close"></i>
          <i class="icon-when-hidden" data-lucide="panel-top-open"></i>
        </button>
        <button id="toggleSidecar" class="chrome-toggle" type="button" title="Hide layout controls" aria-label="Hide layout controls" aria-pressed="false">
          <i class="icon-when-visible" data-lucide="panel-left-close"></i>
          <i class="icon-when-hidden" data-lucide="panel-left-open"></i>
        </button>
        <button id="closeAllTerminals" class="chrome-toggle chrome-danger" type="button" title="No terminal sessions to close" aria-label="No terminal sessions to close" disabled>
          <i data-lucide="trash-2"></i>
        </button>
      </nav>

      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>MultiTerm</h1>
            <p id="bridgeStatus">Bridge starting</p>
          </div>
        </div>

        <div class="top-actions">
          <label class="field shell-field">
            <span>Shell</span>
            <select id="shellSelect">
              <option value="pwsh">PowerShell 7</option>
              <option value="powershell">Windows PowerShell</option>
            </select>
          </label>

          <label class="field cwd-field">
            <span>CWD</span>
            <input id="cwdInput" type="text" spellcheck="false" autocomplete="off">
          </label>

          <label class="field search-field">
            <span>Search</span>
            <input id="terminalSearchInput" type="search" spellcheck="false" autocomplete="off" placeholder="Filter terminal text">
          </label>

          <button id="addTerminal" class="primary-action" type="button">
            <i data-lucide="plus"></i>
            <span>Terminal</span>
          </button>
        </div>
      </header>

      <div class="workbench">
        <aside class="control-panel" aria-label="Terminal layout controls">
          <section class="control-section">
            <h2>Layout</h2>
            <label class="control-row">
              <span>Mode</span>
              <select id="layoutMode">
                <option value="auto">Auto fit</option>
                <option value="columns">Fixed columns</option>
                <option value="rows">Fixed rows</option>
                <option value="horizontal">Horizontal strip</option>
                <option value="vertical">Vertical stack</option>
                <option value="focus">Focus rail</option>
                <option value="manual">Manual canvas</option>
              </select>
            </label>

            <label class="control-row range-row" data-control="minWidth">
              <span>Min width</span>
              <input id="minWidth" type="range" min="260" max="760" step="20">
              <output id="minWidthValue"></output>
            </label>

            <label class="control-row range-row" data-control="columns">
              <span>Columns</span>
              <input id="columnCount" type="range" min="1" max="8" step="1">
              <output id="columnCountValue"></output>
            </label>

            <label class="control-row range-row" data-control="rows">
              <span>Rows</span>
              <input id="rowCount" type="range" min="1" max="6" step="1">
              <output id="rowCountValue"></output>
            </label>

            <label class="control-row range-row" data-control="paneHeight">
              <span>Pane height</span>
              <input id="paneHeight" type="range" min="180" max="720" step="20">
              <output id="paneHeightValue"></output>
            </label>

            <label class="control-row range-row" data-control="focusWidth">
              <span>Primary</span>
              <input id="focusWidth" type="range" min="45" max="80" step="5">
              <output id="focusWidthValue"></output>
            </label>

            <label class="control-row range-row">
              <span>Gap</span>
              <input id="paneGap" type="range" min="0" max="24" step="2">
              <output id="paneGapValue"></output>
            </label>
          </section>

          <section class="control-section">
            <h2>Terminal</h2>
            <label class="control-row range-row">
              <span>Font</span>
              <input id="fontSize" type="range" min="10" max="22" step="1">
              <output id="fontSizeValue"></output>
            </label>

            <label class="control-row">
              <span>Theme</span>
              <select id="terminalTheme">
                <option value="ember">Ember</option>
                <option value="graphite">Graphite</option>
                <option value="paper">Paper</option>
                <option value="contrast">Contrast</option>
              </select>
            </label>

            <label class="toggle-row">
              <input id="compactChrome" type="checkbox">
              <span>Compact chrome</span>
            </label>

            <label class="toggle-row">
              <input id="syncInput" type="checkbox">
              <span>Sync input</span>
            </label>
          </section>

          <section class="control-section action-grid">
            <button id="fitAll" type="button">
              <i data-lucide="maximize"></i>
              <span>Fit</span>
            </button>
            <button id="resetLayout" type="button">
              <i data-lucide="rotate-ccw"></i>
              <span>Reset</span>
            </button>
          </section>
        </aside>

        <main class="stage" aria-label="Terminal workbench">
          <div id="terminalHost" class="terminal-host" data-layout="auto"></div>
          <div id="snapPreview" class="snap-preview" aria-hidden="true"></div>
        </main>
      </div>
    </div>

    <template id="paneTemplate">
      <article class="terminal-pane">
        <header class="pane-bar">
          <div class="pane-title-wrap">
            <i data-lucide="terminal"></i>
            <input class="pane-title" type="text" spellcheck="false" autocomplete="off">
          </div>
          <span class="pane-status">starting</span>
          <div class="pane-actions">
            <button type="button" data-action="move-left" title="Move left" aria-label="Move left">
              <i data-lucide="arrow-left"></i>
            </button>
            <button type="button" data-action="move-right" title="Move right" aria-label="Move right">
              <i data-lucide="arrow-right"></i>
            </button>
            <button type="button" data-action="focus" title="Focus" aria-label="Focus">
              <i data-lucide="maximize-2"></i>
            </button>
            <button type="button" data-action="duplicate" title="Duplicate" aria-label="Duplicate">
              <i data-lucide="copy-plus"></i>
            </button>
            <button type="button" data-action="close" title="Close" aria-label="Close">
              <i data-lucide="x"></i>
            </button>
          </div>
        </header>
        <div class="terminal-screen"></div>
      </article>
    </template>
  </body>
</html>
